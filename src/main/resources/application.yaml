server:
  port: 8081

spring:
  application:
    name: hm-dianping
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/shopping?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  ai:
    openai:
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SPRING_AI_OPENAI_API_KEY:}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:qwen3.5-flash}
          temperature: ${SPRING_AI_OPENAI_CHAT_TEMPERATURE:0.3}
      embedding:
        options:
          model: ${SPRING_AI_OPENAI_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      milvus:
        initialize-schema: ${SPRING_AI_MILVUS_INITIALIZE_SCHEMA:true}
        database-name: ${SPRING_AI_MILVUS_DATABASE_NAME:default}
        embedding-dimension: ${SPRING_AI_MILVUS_EMBEDDING_DIMENSION:1024}
        client:
          host: ${SPRING_AI_MILVUS_HOST:localhost}
          port: ${SPRING_AI_MILVUS_PORT:19530}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    virtual-host: /
    username: admin
    password: 123321
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: false
        acknowledge-mode: manual

mybatis-plus:
  type-aliases-package: com.hmdp.entity

logging:
  level:
    com.hmdp: debug

hmdp:
  id-worker:
    snowflake:
      begin-timestamp: ${HMDP_SNOWFLAKE_BEGIN_TIMESTAMP:1640995200000}
      datacenter-id: ${HMDP_SNOWFLAKE_DATACENTER_ID:1}
      fallback-worker-id: ${HMDP_SNOWFLAKE_FALLBACK_WORKER_ID:1}
      small-rollback-threshold-ms: ${HMDP_SNOWFLAKE_SMALL_ROLLBACK_THRESHOLD_MS:5}
      severe-rollback-threshold-ms: ${HMDP_SNOWFLAKE_SEVERE_ROLLBACK_THRESHOLD_MS:5000}
      worker-lease-seconds: ${HMDP_SNOWFLAKE_WORKER_LEASE_SECONDS:30}
      worker-renew-interval-ms: ${HMDP_SNOWFLAKE_WORKER_RENEW_INTERVAL_MS:10000}
      worker-lease-key-prefix: ${HMDP_SNOWFLAKE_WORKER_LEASE_KEY_PREFIX:hmdp:id:worker}
    segment:
      step: ${HMDP_SEGMENT_STEP:1000}
      redis-key-prefix: ${HMDP_SEGMENT_REDIS_KEY_PREFIX:hmdp:id:segment}
    failover:
      segment-mode-duration-ms: ${HMDP_ID_FAILOVER_SEGMENT_MODE_DURATION_MS:30000}

ai:
  agent:
    bootstrap:
      enabled: ${AI_AGENT_BOOTSTRAP_ENABLED:true}
      fail-fast: ${AI_AGENT_BOOTSTRAP_FAIL_FAST:false}
    memory:
      window-size: ${AI_AGENT_MEMORY_WINDOW_SIZE:8}
    model:
      connect-timeout-seconds: ${AI_AGENT_MODEL_CONNECT_TIMEOUT_SECONDS:10}
      read-timeout-seconds: ${AI_AGENT_MODEL_READ_TIMEOUT_SECONDS:90}
      write-timeout-seconds: ${AI_AGENT_MODEL_WRITE_TIMEOUT_SECONDS:90}
      call-timeout-seconds: ${AI_AGENT_MODEL_CALL_TIMEOUT_SECONDS:120}
    streaming:
      enabled: ${AI_AGENT_STREAMING_ENABLED:true}
      timeout-seconds: ${AI_AGENT_STREAMING_TIMEOUT_SECONDS:75}
      fallback-chunk-size: ${AI_AGENT_STREAMING_FALLBACK_CHUNK_SIZE:24}
    insight:
      max-review-samples: ${AI_AGENT_INSIGHT_MAX_REVIEW_SAMPLES:8}
      max-review-chars-per-sample: ${AI_AGENT_INSIGHT_MAX_REVIEW_CHARS_PER_SAMPLE:280}
      max-combined-chars: ${AI_AGENT_INSIGHT_MAX_COMBINED_CHARS:2200}
      max-vector-hits: ${AI_AGENT_INSIGHT_MAX_VECTOR_HITS:4}
      max-vector-hit-chars: ${AI_AGENT_INSIGHT_MAX_VECTOR_HIT_CHARS:180}
    multi-agent:
      max-steps: ${AI_AGENT_MULTI_AGENT_MAX_STEPS:20}
    rag:
      top-k: ${AI_AGENT_RAG_TOP_K:5}
      similarity-threshold: ${AI_AGENT_RAG_SIMILARITY_THRESHOLD:0.65}
      knowledge-similarity-threshold: ${AI_AGENT_RAG_KNOWLEDGE_SIMILARITY_THRESHOLD:0.35}
      collections:
        knowledge: knowledge_vector
        shop-profile: shop_profile_vector
        blog-review: blog_review_vector
    mcp:
      enabled: ${AI_AGENT_MCP_ENABLED:false}
      timeout-millis: ${AI_AGENT_MCP_TIMEOUT_MILLIS:2500}
      tool-whitelist:
        - ${AI_AGENT_MCP_ROUTE_TOOL_NAME:route_plan}
        - ${AI_AGENT_MCP_WEATHER_TOOL_NAME:weather_brief}
      route:
        enabled: ${AI_AGENT_MCP_ROUTE_ENABLED:false}
        base-url: ${AI_AGENT_MCP_ROUTE_BASE_URL:}
        invoke-path: ${AI_AGENT_MCP_ROUTE_INVOKE_PATH:/tools/invoke}
        api-key: ${AI_AGENT_MCP_ROUTE_API_KEY:}
        tool-name: ${AI_AGENT_MCP_ROUTE_TOOL_NAME:route_plan}
      weather:
        enabled: ${AI_AGENT_MCP_WEATHER_ENABLED:false}
        base-url: ${AI_AGENT_MCP_WEATHER_BASE_URL:}
        invoke-path: ${AI_AGENT_MCP_WEATHER_INVOKE_PATH:/tools/invoke}
        api-key: ${AI_AGENT_MCP_WEATHER_API_KEY:}
        tool-name: ${AI_AGENT_MCP_WEATHER_TOOL_NAME:weather_brief}
