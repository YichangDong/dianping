server:
  port: 8081
spring:
  application:
    name: shopping
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/shopping?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  data:
    redis:
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    virtual-host: /
    username: admin
    password: 123321
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        prefetch: 1
        default-requeue-rejected: false
        acknowledge-mode: manual
mybatis-plus:
  type-aliases-package: com.shopping.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug